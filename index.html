<html lang="en">
<head>
<meta charset="UTF-8">

<title>Congressional Hearing Tracker — June 24, 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0D0C0A; color: #E8E0D0; font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #2A2820; border-radius: 2px; }

  .header-timestamp { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #908070; letter-spacing: 0.04em; line-height: 1.5; }
  .stats { display: flex; border-bottom: 1px solid rgba(255,255,255,0.05); background: #0A0908; }

  .stat-number { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; line-height: 1; }
  .stat-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.1em; color: #706860; text-transform: uppercase; margin-top: 3px; }
  .filters { display: flex; gap: 6px; padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); flex-wrap: wrap; }
  .filter-btn { background: transparent; border: 1px solid rgba(255,255,255,0.07); color: #908070; border-radius: 5px; padding: 5px 12px; font-size: 11px; font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.06em; cursor: pointer; transition: all 0.15s; }
  .filter-btn.active { background: rgba(200,169,110,0.13); border-color: rgba(200,169,110,0.4); color: #C8A96E; }
  .cards { padding: 14px 16px; }
  .count-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #706860; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
  .card { border: 1px solid rgba(255,255,255,0.07); border-radius: 8px; padding: 14px 16px; cursor: pointer; margin-bottom: 9px; background: rgba(255,255,255,0.018); transition: background 0.15s; }
  .card.open { background: rgba(255,255,255,0.038); }
  .card.cancelled { opacity: 0.5; }

  .tag { border-radius: 4px; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; padding: 2px 7px; text-transform: uppercase; font-family: 'IBM Plex Mono', monospace; flex-shrink: 0; }
  .tag-senate { background: rgba(200,169,110,0.13); color: #C8A96E; border: 1px solid rgba(200,169,110,0.35); }
  .tag-house  { background: rgba(100,160,200,0.11); color: #7FB3D3; border: 1px solid rgba(100,160,200,0.30); }
  .tag-joint  { background: rgba(160,120,200,0.11); color: #B39DDB; border: 1px solid rgba(160,120,200,0.30); }
  .tag-cancelled { background: rgba(200,60,60,0.15); color: #E07070; border: 1px solid rgba(200,60,60,0.3); }
  .card-time { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #A09080; letter-spacing: 0.04em; }
  .card-committee { font-size: 13px; font-weight: 600; color: #DDD5C5; line-height: 1.4; margin-bottom: 3px; }
  .card-topic { font-size: 12px; color: #A09080; line-height: 1.4; }
  .card-right { text-align: right; min-width: 96px; flex-shrink: 0; }
  .card-building { font-family: 'IBM Plex Mono', monospace; font-size: 11px; margin-bottom: 2px; }
  .card-room { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #908070; }
  .change-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px; }

  .card.open .card-body { display: block; }
  .card-section { margin-bottom: 10px; }

  .chamber-senate { border-left: 3px solid rgba(200,169,110,0.5); }
  .chamber-house  { border-left: 3px solid rgba(100,160,200,0.45); }
  .chamber-joint  { border-left: 3px solid rgba(160,120,200,0.45); }
  .bc-senate { color: #C8A96E; } .bc-house { color: #7FB3D3; } .bc-joint { color: #B39DDB; }
  .sl-senate { color: #C8A96E; } .sl-house { color: #7FB3D3; } .sl-joint { color: #B39DDB; }
  .wb-senate { border-left: 2px solid rgba(200,169,110,0.5); }
  .wb-house  { border-left: 2px solid rgba(100,160,200,0.45); }
  .wb-joint  { border-left: 2px solid rgba(160,120,200,0.45); }
</style>

<script>
const HEARINGS = [{"chamber": "Senate", "committee": "Environment and Public Works", "chair": "Sen. Shelley Moore Capito (R-WV), Chair · Ranking: Sen. Sheldon Whitehouse (D-RI)", "time": "10:00 AM ET", "building": "Dirksen (SD)", "room": "SD-406", "topic": "Nomination: Kevin Lilly — Assistant Secretary for Fish and Wildlife, Dept. of the Interior", "details": "Full committee confirmation hearing for the nominee to lead Fish and Wildlife policy at the Interior Department. Lilly is from Texas and previously served in natural resources roles.", "witnesses": ["Kevin Lilly (TX) — Nominee, Assistant Secretary for Fish and Wildlife, U.S. Dept. of the Interior"], "cancelled": false, "changes": ["Witness added: Kevin Lilly (TX) — Nominee, Assistant Secretary for Fish and Wildlife, U.S. Dept. of the Interior · 11:07 AM"]}, {"chamber": "Senate", "committee": "Indian Affairs", "chair": "Sen. Lisa Murkowski (R-AK), Chair · Ranking: Sen. Brian Schatz (D-HI)", "time": "10:00 AM ET", "building": "Dirksen (SD)", "room": "SD-628", "topic": "Nomination: Mark Cruz — Director, Indian Health Service", "details": "Confirmation hearing for the nominee to lead the Indian Health Service, which provides healthcare to approximately 2.6 million American Indians and Alaska Natives.", "witnesses": ["Mark Cruz (OR) — Nominee, Director of the Indian Health Service, Dept. of Health & Human Services"], "cancelled": false, "changes": ["Room changed to SD-628 · 10:33 AM", "Witness added: Mark Cruz (OR) — Nominee, Director of the Indian Health Service, Dept. of Health & Human Services · 11:07 AM"]}, {"chamber": "Senate", "committee": "Commerce, Science & Transportation", "chair": "Sen. Ted Cruz (R-TX), Chair · Ranking: Sen. Maria Cantwell (D-WA)", "time": "10:00 AM ET", "building": "Russell (SR)", "room": "SR-253", "topic": "Nominations: Chapman (NTSB), Eppler (DOT CFO), Hedlund (STB), Lorenze & Sessions (CPSC)", "details": "Full committee confirmation hearing for five nominees across transportation safety and consumer product safety agencies — covering the National Transportation Safety Board, Department of Transportation CFO, Surface Transportation Board, and two Consumer Product Safety Commission seats.", "witnesses": ["Thomas B. Chapman (MD) — Nominee, Member, National Transportation Safety Board", "Edward Eppler (CT) — Nominee, Chief Financial Officer, Dept. of Transportation", "Karen Jean Hedlund (NY) — Nominee, Member, Surface Transportation Board", "Brien Lorenze (VA) — Nominee, Commissioner, Consumer Product Safety Commission", "Karen Sessions (TX) — Nominee, Commissioner, Consumer Product Safety Commission"], "cancelled": false, "changes": []}, {"chamber": "Senate", "committee": "Judiciary", "chair": "Sen. Chuck Grassley (R-IA), Chair · Ranking: Sen. Dick Durbin (D-IL)", "time": "10:15 AM ET", "building": "Hart (SH)", "room": "SH-216", "topic": "Business Meeting: Federal Judicial Nominations — Circuit & District Court Judges", "details": "Open executive session to consider five pending federal judicial nominations — one circuit court nominee for the 8th Circuit and four district court nominees across Texas, Michigan, and Pennsylvania.", "witnesses": ["Kasdin Miller Mitchell — Nominee, U.S. District Judge, Northern District of Texas", "Angela Veronica Colmenero — Nominee, U.S. District Judge, Southern District of Texas", "Daniel Mack Traynor (ND) — Nominee, U.S. Circuit Judge, 8th Circuit", "Michael C. Martin — Nominee, U.S. District Judge, Eastern District of Michigan", "Antonio M. Pozos — Nominee, U.S. District Judge, Eastern District of Pennsylvania"], "cancelled": true, "changes": ["Witnesses added: Kasdin Miller Mitchell — Nominee, U.S. District Judge, Northern District of Texas, Angela Veronica Colmenero — Nominee, U.S. District Judge, Southern District of Texas +3 more · 11:07 AM"]}, {"chamber": "Senate", "committee": "Caucus on International Narcotics Control", "chair": "Sen. Markwayne Mullin (R-OK) · Sen. Troy Edgar (R-CA), Co-Chairs", "time": "2:00 PM ET", "building": "Dirksen (SD)", "room": "SD-419", "topic": "Global Reach of Mexican Drug Cartels and Risks to U.S. National Security", "details": "Hearing examining the expanding international footprint of Mexican drug cartels, their connections to foreign adversaries, and the corresponding national security threats posed to the United States.", "witnesses": ["The Honorable Markwayne Mullin — Co-Chair", "The Honorable Troy Edgar — Co-Chair", "Additional witnesses not yet publicly posted"], "cancelled": false, "changes": []}, {"chamber": "Senate", "committee": "Judiciary — Subcommittee on the Constitution", "chair": "Sen. Mike Lee (R-UT), Subcommittee Chair", "time": "2:30 PM ET", "building": "Dirksen (SD)", "room": "SD-226", "topic": "Protecting American Citizenship III: Denaturalization and Its Constitutional Limits", "details": "Third in a series of subcommittee hearings on American citizenship law. Examines denaturalization — the legal process by which citizenship can be revoked — and its constitutional boundaries under the 14th Amendment and relevant Supreme Court precedent.", "witnesses": ["Witnesses not yet publicly posted"], "cancelled": false, "changes": []}, {"chamber": "Senate", "committee": "Finance — Subcommittee on Social Security, Pensions & Family Policy", "chair": "Sen. Bill Cassidy (R-LA), Subcommittee Chair", "time": "3:00 PM ET", "building": "Dirksen (SD)", "room": "SD-215", "topic": "The Future of Social Security", "details": "Hearing examining the long-term fiscal outlook of the Social Security program, projected insolvency timelines, and potential policy reforms including benefit adjustments, payroll tax changes, and retirement age modifications.", "witnesses": ["Witnesses not yet publicly posted"], "cancelled": false, "changes": []}, {"chamber": "Senate", "committee": "Select Committee on Intelligence", "chair": "Sen. Tom Cotton (R-AR), Chair · Ranking: Sen. Mark Warner (D-VA)", "time": "3:00 PM ET", "building": "Hart (SH)", "room": "SH-219", "topic": "Closed Briefing on Certain Intelligence Matters", "details": "Closed briefing. Details are classified. No public witness list or agenda.", "witnesses": ["Closed session — witnesses not publicly disclosed"], "cancelled": false, "changes": []}, {"chamber": "Senate", "committee": "Homeland Security & Governmental Affairs", "chair": "Sen. Rand Paul (R-KY), Chair · Ranking: Sen. Gary Peters (D-MI)", "time": "9:30 AM ET", "building": "Dirksen (SD)", "room": "SD-342", "topic": "Reforming the U.S. Postal Service's Business Model", "details": "Full committee hearing examining structural, financial, and operational reforms to the U.S. Postal Service, which faces ongoing solvency and delivery challenges.", "witnesses": ["Witnesses not yet publicly posted"], "cancelled": false, "changes": []}, {"chamber": "House", "committee": "Homeland Security", "chair": "Rep. Mark Green (R-TN), Chair · Ranking: Rep. Bennie Thompson (D-MS)", "time": "10:00 AM ET", "building": "Cannon (CHOB)", "room": "310 CHOB", "topic": "Various Measures — Full Committee Markup", "details": "Full committee markup session for pending legislation within the Homeland Security Committee's jurisdiction.", "witnesses": ["Markup — no external witnesses"], "cancelled": false, "changes": []}, {"chamber": "House", "committee": "Science, Space & Technology — Subcommittee on Investigations & Oversight", "chair": "Rep. Jay Obernolte (R-CA), Subcommittee Chair", "time": "10:00 AM ET", "building": "Rayburn (RHOB)", "room": "2318 RHOB", "topic": "Safeguarding Federal Research Funds: The False Claims Act's Role in Combating Grant Fraud", "details": "Oversight hearing examining how the False Claims Act is being used — and could be strengthened — to combat fraud in federally funded research grants across universities and research institutions.", "witnesses": ["Mr. Aaron Lukas", "The Honorable Christopher Fox"], "cancelled": false, "changes": []}, {"chamber": "House", "committee": "Agriculture", "chair": "Rep. GT Thompson (R-PA), Chair · Ranking: Rep. David Scott (D-GA)", "time": "10:00 AM ET", "building": "Longworth (LHOB)", "room": "1300 LHOB", "topic": "Review of Farm Safety Net, Disaster, and Conservation Programs", "details": "Full committee hearing reviewing the implementation and effectiveness of existing farm safety net programs, disaster assistance mechanisms, and conservation initiatives ahead of the next Farm Bill reauthorization cycle.", "witnesses": ["Witnesses not yet publicly posted"], "cancelled": false, "changes": []}, {"chamber": "House", "committee": "Financial Services", "chair": "Rep. French Hill (R-AR), Chair · Ranking: Rep. Maxine Waters (D-CA)", "time": "10:00 AM ET", "building": "Rayburn (RHOB)", "room": "2128 RHOB", "topic": "Future of Payments: Promoting Innovation and Fair Markets", "details": "Full committee hearing on the evolving payments landscape, examining digital payments, fintech competition, stablecoin regulation, and regulatory frameworks for promoting innovation while protecting consumers.", "witnesses": ["Mrs. Paige Paridon", "Ms. Tara Flynn", "Mr. David Portilla", "Mrs. Eileen O'Mara", "Ms. Rachel Anderika"], "cancelled": false, "changes": []}, {"chamber": "House", "committee": "Judiciary — Subcommittee on Administrative State, Regulatory Reform & Antitrust", "chair": "Rep. Thomas Massie (R-KY), Subcommittee Chair", "time": "10:00 AM ET", "building": "Rayburn (RHOB)", "room": "2141 RHOB", "topic": "The 30,000 Foot View: Competition and Regulation in the U.S. Airline Industry", "details": "Hearing examining antitrust and regulatory issues in the airline industry, including market concentration following recent mergers, DOT and DOJ oversight, consumer protections, and whether current regulatory frameworks adequately promote competition.", "witnesses": ["Witnesses not yet publicly posted"], "cancelled": false, "changes": []}, {"chamber": "House", "committee": "Energy & Commerce — Subcommittee on Environment", "chair": "Rep. Jeff Dunc ": "Closed", "topic": "Effectiveness of the Intelligence Community's Inspector General (CLOSED)", "details": "Closed hearing examining the effectiveness and independence of the Intelligence Community Inspector General. No public witness list or agenda.", "witnesses": ["Closed session — witnesses not publicly disclosed"], "cancelled": false, "changes": ["Location changed to Rayburn (RHOB) · 10:27 AM", "Witness added: Closed session — witnesses not publicly disclosed · 11:07 AM"]}, {"chamber": "House", "committee": "Veterans' Affairs — Subcommittee on Oversight & Investigations", "chair": "Rep. Mike Bost (R-IL), Chair · Ranking: Rep. Julia Brownley (D-CA)", "time": "2:15 PM ET", "building": "Cannon (CHOB)", "room": "360 CHOB", "topic": "Failure at the Front Gate: Examining VA Police and Security Deficiencies", "details": "Oversight hearing on security and policing deficiencies at VA facilities nationwide, including inadequate personnel levels, training gaps, inconsistent use-of-force policies, and infrastructure vulnerabilities at medical centers.", "witnesses": ["Patrick Hernandez", "Brett Simms", "Triana McNeil — Government Accountability Office (GAO)", "Matthew Leffler", "Reginald Neal", "Mark Engelbaum"], "cancelled": false, "changes": []}, {"chamber": "Joint", "committee": "Joint Economic Committee", "chair": "Sen. Mike Lee (R-UT), Chair · Ranking: Rep. Don Beyer (D-VA)", "time": "2:00 PM ET", "building": "Dirksen (SD)", "room": "SD-G50", "topic": "Protecting Patients and Taxpayers: Combating Healthcare Fraud and Leakage to Strengthen Program Integrity", "details": "Joint hearing examining healthcare fraud, waste, and program integrity issues affecting Medicare, Medicaid, and other federal health programs. Focuses on policy mechanisms to reduce improper payments and protect taxpayer funds.", "witnesses": ["Witnesses not yet publicly posted"], "cancelled": false, "changes": []}];
function cls(c) { return c==='Senate'?'senate':c==='House'?'house':'joint'; }
function buildCards(filter) {
  let filtered;
  if (filter==='All')           filtered = HEARINGS;
  else if (filter==='Updated')  filtered = HEARINGS.filter(h=>h.changes&&h.changes.length>0);
  else if (filter==='Cancelled')filtered = HEARINGS.filter(h=>h.cancelled);
  else filtered = HEARINGS.filter(h=>h.chamber===filter);
  document.getElementById('count-label').textContent =
    filtered.length+' hearing'+(filtered.length!==1?'s':'')+' — tap any card to expand';
  const list = document.getElementById('card-list');
  list.innerHTML = '';
  if (!filtered.length) {
    list.innerHTML='<div class="empty">No '+(filter!=='All'?filter.toLowerCase()+' ':'')+'hearings found.</div>';
    return;
  }
  filtered.forEach(h => {
    const c = cls(h.chamber);
    const hasChanges = h.changes&&h.changes.length>0;
    const card = document.createElement('div');
    card.className = ['card','chamber-'+c,h.cancelled?'cancelled':'',hasChanges?'has-changes':''].filter(Boolean).join(' ');
    const pills = hasChanges
      ? '<div class="change-pills">'+h.changes.map(ch=>
          '<span class="change-pill'+(ch.toLowerCase().includes('cancel')?' cancelled-pill':'')+
          '">⚡ '+ch+'</span>').join('')+'</div>'
      : '';
    const chairVal   = h.chair     || '<span class="dim">Not yet posted</span>';
    const detailsVal = h.details   || h.topic || '';
    const witnessHtml = h.witnesses && h.witnesses.length
      ? h.witnesses.map(w=>'<div class="witness wb-'+c+'">'+w+'</div>').join('')
      : '<div class="witness wb-'+c+'" style="color:#4A4540;font-style:italic">Not yet posted</div>';

    card.innerHTML = `
      <div class="card-top">
        <div class="card-left">
          <div class="card-meta">
            <span class="tag tag-${c}">${h.chamber}</span>
            ${h.cancelled?'<span class="tag tag-cancelled">Cancelled</span>':''}
            <span class="card-time">${h.time}</span>
          </div>
          <div class="card-committee">${h.committee}</div>
          <div class="card-topic">${h.topic}</div>
          ${pills}
        </div>
        <div class="card-right">
          <div class="card-building bc-${c}">${h.building}</div>
          <div class="card-room">${h.room}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-section">
          <div class="card-section-label sl-${c}">Chair</div>
          <div class="card-section-value">${chairVal}</div>
        </div>
        ${detailsVal ? '<div class="card-section"><div class="card-section-label sl-'+c+'">About</div><div class="card-section-value">'+detailsVal+'</div></div>' : ''}
        <div class="card-section">
          <div class="card-section-label sl-${c}">Witnesses</div>
          ${witnessHtml}
        </div>
      </div>`;
    card.addEventListener('click',()=>card.classList.toggle('open'));
    list.appendChild(card);
  });
}
function setFilter(f) {
  document.querySelectorAll('.filter-btn').forEach(b=>
    b.classList.toggle('active',
      b.textContent.replace('⚡ ','').replace('✕ ','')===f||(f==='All'&&b.textContent==='All')));
  buildCards(f);
}
buildCards('All');
</script>
</body>
</html>
