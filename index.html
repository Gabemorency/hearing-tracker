<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Congressional Hearing Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    background: #0D0C0A;
    color: #E8E0D0;
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #2A2820; border-radius: 2px; }

  /* ── Header ── */
  .header {
    border-bottom: 1px solid rgba(200,169,110,0.18);
    padding: 20px 20px 16px;
    background: rgba(200,169,110,0.025);
  }
  .header-eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: #C8A96E;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(20px, 5vw, 26px);
    font-weight: 700;
    color: #F0E8D8;
    letter-spacing: -0.01em;
    margin-bottom: 6px;
  }
  .header-timestamp {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: #908070;
    letter-spacing: 0.04em;
    line-height: 1.5;
  }

  /* ── Stats bar ── */
  .stats {
    display: flex;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    background: #0A0908;
  }
  .stat {
    flex: 1;
    padding: 12px 8px;
    text-align: center;
    border-right: 1px solid rgba(255,255,255,0.04);
  }
  .stat-number {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
  }
  .stat-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: #706860;
    text-transform: uppercase;
    margin-top: 3px;
  }

  /* ── Filters ── */
  .filters {
    display: flex;
    gap: 6px;
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    flex-wrap: wrap;
  }
  .filter-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.07);
    color: #908070;
    border-radius: 5px;
    padding: 5px 12px;
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn.active {
    background: rgba(200,169,110,0.13);
    border-color: rgba(200,169,110,0.4);
    color: #C8A96E;
  }

  /* ── Cards ── */
  .cards { padding: 14px 16px; }
  .count-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: #706860;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .card {
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 8px;
    padding: 14px 16px;
    cursor: pointer;
    margin-bottom: 9px;
    background: rgba(255,255,255,0.018);
    transition: background 0.15s;
  }
  .card.open { background: rgba(255,255,255,0.038); }
  .card-top { display: flex; gap: 10px; justify-content: space-between; align-items: flex-start; }
  .card-left { flex: 1; min-width: 0; }
  .card-meta { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; flex-wrap: wrap; }
  .tag {
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 2px 7px;
    text-transform: uppercase;
    font-family: 'IBM Plex Mono', monospace;
    flex-shrink: 0;
  }
  .tag-senate { background: rgba(200,169,110,0.13); color: #C8A96E; border: 1px solid rgba(200,169,110,0.35); }
  .tag-house  { background: rgba(100,160,200,0.11); color: #7FB3D3; border: 1px solid rgba(100,160,200,0.30); }
  .tag-joint  { background: rgba(160,120,200,0.11); color: #B39DDB; border: 1px solid rgba(160,120,200,0.30); }
  .card-time { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #A09080; letter-spacing: 0.04em; }
  .card-committee { font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; font-weight: 600; color: #DDD5C5; line-height: 1.4; margin-bottom: 3px; }
  .card-topic { font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; color: #A09080; line-height: 1.4; }
  .card-right { text-align: right; min-width: 96px; flex-shrink: 0; }
  .card-building { font-family: 'IBM Plex Mono', monospace; font-size: 11px; margin-bottom: 2px; }
  .card-room { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #908070; }
  .card-body { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.06); display: none; }
  .card.open .card-body { display: block; }
  .card-chair { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #A09080; letter-spacing: 0.05em; margin-bottom: 10px; }
  .card-details { font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; color: #A09080; line-height: 1.65; margin-bottom: 10px; }
  .witnesses-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
  .witness { font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; color: #B0A090; line-height: 1.5; padding-left: 10px; margin-bottom: 4px; }

  /* ── Source note ── */
  .source-note {
    margin-top: 20px;
    padding: 12px 14px;
    background: rgba(255,255,255,0.012);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: #706860;
    line-height: 1.6;
  }

  /* chamber accent colors for card border-left */
  .chamber-senate { border-left: 3px solid rgba(200,169,110,0.5); }
  .chamber-house  { border-left: 3px solid rgba(100,160,200,0.45); }
  .chamber-joint  { border-left: 3px solid rgba(160,120,200,0.45); }
  .building-senate { color: #C8A96E; }
  .building-house  { color: #7FB3D3; }
  .building-joint  { color: #B39DDB; }
  .witnesses-senate { color: #C8A96E; }
  .witnesses-house  { color: #7FB3D3; }
  .witnesses-joint  { color: #B39DDB; }
  .witness-border-senate { border-left: 2px solid rgba(200,169,110,0.5); }
  .witness-border-house  { border-left: 2px solid rgba(100,160,200,0.45); }
  .witness-border-joint  { border-left: 2px solid rgba(160,120,200,0.45); }
</style>
</head>

<div class="stats">

  <div class="stat"><div class="stat-number" style="color:#7FB3D3" id="house-count">0</div><div class="stat-label">House</div></div>

<div class="filters">

  <div id="card-list"></div>
  <div class="source-note">

let currentFilter = "All";

function chamberClass(c) {
  return c === "Senate" ? "senate" : c === "House" ? "house" : "joint";
}

function buildCards(filter) {
  const list = document.getElementById("card-list");
  const label = document.getElementById("count-label");
  const filtered = filter === "All" ? HEARINGS : HEARINGS.filter(h => h.chamber === filter);
  label.textContent = `${filtered.length} hearing${filtered.length !== 1 ? "s" : ""} — tap any card to expand`;
  list.innerHTML = "";
  filtered.forEach((h, i) => {
    const cls = chamberClass(h.chamber);
    const card = document.createElement("div");
    card.className = `card chamber-${cls}`;
    card.innerHTML = `
      <div class="card-top">
        <div class="card-left">
          <div class="card-meta">
            <span class="tag tag-${cls}">${h.chamber}</span>
            <span class="card-time">${h.time}</span>
          </div>
          <div class="card-committee">${h.committee}</div>
          <div class="card-topic">${h.topic}</div>
        </div>
        <div class="card-right">
          <div class="card-building building-${cls}">${h.building}</div>
          <div class="card-room">${h.room}</div>
        </div>
      </div>
      <div class="card-body">
        ${h.chair ? `<div class="card-chair">◆ ${h.chair}</div>` : ""}
        <div class="card-details">${h.details}</div>
        ${h.witnesses?.length ? `
          <div class="witnesses-label witnesses-${cls}">Witnesses</div>
          ${h.witnesses.map(w => `<div class="witness witness-border-${cls}">${w}</div>`).join("")}
        ` : ""}
      </div>
    `;
    card.addEventListener("click", () => card.classList.toggle("open"));
    list.appendChild(card);
  });
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll(".filter-btn").forEach(b => {
    b.classList.toggle("active", b.textContent === f);
  });
  buildCards(f);
}

function init() {
  document.getElementById("timestamp").textContent =
    `As of ${GENERATED_AT} · ${DATE_LABEL} · Schedules subject to change.`;
  document.getElementById("total-count").textContent  = HEARINGS.length;
  document.getElementById("senate-count").textContent = HEARINGS.filter(h => h.chamber === "Senate").length;
  document.getElementById("house-count").textContent  = HEARINGS.filter(h => h.chamber === "House").length;
  document.getElementById("joint-count").textContent  = HEARINGS.filter(h => h.chamber === "Joint").length;
  buildCards("All");
}

init();
</script>
