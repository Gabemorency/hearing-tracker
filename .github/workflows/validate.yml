name: Validate Hardcoded Data

on:
  schedule:
    - cron: '0 12 */3 * *'  # Every 3 days at noon UTC
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml --break-system-packages

      - name: Run validation
        id: validate
        run: python validate_hardcoded.py
        continue-on-error: true

      - name: Open GitHub Issue if validation failed
        if: steps.validate.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## ⚠️ Hardcoded Data Needs Review\n\n';
            body += 'The automated validator found issues with hardcoded data in the hearing tracker.\n\n';
            if (fs.existsSync('validation_issues.txt')) {
              const issues = fs.readFileSync('validation_issues.txt', 'utf8');
              body += issues.split('\n').map(l => `- ${l}`).join('\n');
            }
            body += '\n\n---\n*Auto-generated by validate.yml — runs every 3 days*';

            // Check if issue already exists to avoid duplicates
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'hardcoded-data'
            });

            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '⚠️ Hardcoded data may be out of date',
                body: body,
                labels: ['hardcoded-data']
              });
              console.log('Issue created.');
            } else {
              console.log('Issue already open — skipping duplicate.');
            }
