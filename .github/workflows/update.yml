name: Update Hearing Tracker

on:
  schedule:
    - cron: '7 */2 * * *'   # every 2 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install playwright beautifulsoup4 lxml pdfplumber requests

      - name: Install Chromium
        run: playwright install chromium

      - name: Run scraper
        run: python scrape.py

      - name: Fetch DomeWatch data
        env:
          DOMEWATCH_API_KEY: ${{ secrets.DOMEWATCH_API_KEY }}
        run: python fetch_domewatch.py

      - name: Inject API keys into HTML
        env:
          DOMEWATCH_API_KEY: ${{ secrets.DOMEWATCH_API_KEY }}
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: python inject_keys.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html snapshot.json domewatch_whip.json domewatch_updates.json domewatch_meetings.json
          git diff --cached --quiet || git commit -m "Auto-update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase
          git push
