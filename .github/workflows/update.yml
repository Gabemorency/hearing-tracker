name: Update Hearing Tracker

on:
  schedule:
    - cron: '*/20 * * * *'   # every 20 minutes
  workflow_dispatch:        # manual trigger from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install playwright beautifulsoup4 lxml pdfplumber requests

      - name: Install Chromium
        run: playwright install chromium

      - name: Run scraper
        run: python scrape.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html snapshot.json
          git diff --cached --quiet || git commit -m "Auto-update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
