name: Nightly Baseline Builder

on:
  schedule:
    - cron: '0 1 * * 2-6'  # 9 PM ET = 1 AM UTC, Mon-Fri
  workflow_dispatch:

jobs:
  build-baseline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install playwright beautifulsoup4 lxml pdfplumber requests pyyaml

      - name: Install Chromium
        run: playwright install chromium

      - name: Build hearing baseline for tomorrow
        run: python build_baseline.py

      - name: Build member directory
        run: python build_members.py

      - name: Inject API keys into HTML
        run: |
          sed -i "s|__DOMEWATCH_KEY__|${{ secrets.DOMEWATCH_API_KEY }}|g" index.html
          sed -i "s|__DOMEWATCH_KEY__|${{ secrets.DOMEWATCH_API_KEY }}|g" calendar.html
          sed -i "s|__CONGRESS_KEY__|${{ secrets.CONGRESS_API_KEY }}|g" index.html
          sed -i "s|__CONGRESS_KEY__|${{ secrets.CONGRESS_API_KEY }}|g" calendar.html
          sed -i "s|__CONGRESS_KEY__|${{ secrets.CONGRESS_API_KEY }}|g" members.html

      - name: Commit everything
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add baseline.json members.json members.html index.html calendar.html bios/
          git diff --cached --quiet || git commit -m "Nightly build $(date -u '+%Y-%m-%d')"
          git pull --rebase
          git push
